version: "3.8"

services:
  postgres:
    image: postgres:latest
    container_name: postgres_local
    environment:
      POSTGRES_USER: birlik
      POSTGRES_PASSWORD: local
      POSTGRES_DB: birlik_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist data on your disk
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../media:/var/www/html/media:ro
    ports:
      - "8888:8888"
    restart: always

volumes:
  postgres_data:
